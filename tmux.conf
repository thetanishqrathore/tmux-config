# ============================================================================
#  tmux-config — a convenient, self-contained tmux configuration
#  No plugins required. Tested on tmux 3.4.
#  Repo: https://github.com/<you>/tmux-config
# ============================================================================

# ----------------------------------------------------------------------------
#  General
# ----------------------------------------------------------------------------

# Prefix: Ctrl-Space (frees the default Ctrl-b)
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# True color + 256 color support
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-overrides ",xterm-256color:Tc"

# Use the system clipboard via OSC 52 (works over SSH, no xclip/pbcopy needed)
set -g set-clipboard on

# Snappier key response — don't wait on the Escape key (helps Vim/Neovim)
set -sg escape-time 10

# Bigger scrollback buffer
set -g history-limit 50000

# Start windows and panes at 1, renumber when one closes
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Keep window names you set; don't let programs rename them
set -g allow-rename off
setw -g automatic-rename off

# Focus events (for editors that care, e.g. Neovim autoread)
set -g focus-events on

# Show messages a touch longer
set -g display-time 2000
set -g display-panes-time 2000

# ----------------------------------------------------------------------------
#  Mouse
# ----------------------------------------------------------------------------
# Click to select panes/windows, drag borders to resize, wheel to scroll.
set -g mouse on

# Wheel scroll enters copy-mode and scrolls; drag-release copies the selection.
bind -T copy-mode-vi WheelUpPane   send -X scroll-up
bind -T copy-mode-vi WheelDownPane send -X scroll-down

# ----------------------------------------------------------------------------
#  Key bindings
# ----------------------------------------------------------------------------

# Reload config without restarting tmux
bind r source-file ~/.tmux.conf \; display-message "  tmux.conf reloaded"

# Intuitive splits that keep the current directory.  | = vertical, - = horizontal
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
# Keep the originals too, as muscle-memory fallbacks
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

# New window in the current directory
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation (prefix + h/j/k/l)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with prefix + H/J/K/L (repeatable: hold and tap)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Quick window switching (repeatable)
bind -r n next-window
bind -r p previous-window
bind Tab last-window

# Alt+arrow to switch panes without the prefix
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Shift+arrow to switch windows without the prefix
bind -n S-Left  previous-window
bind -n S-Right next-window

# Toggle pane zoom (also available as the default prefix+z)
bind m resize-pane -Z

# Synchronize input across all panes in a window (toggle)
bind e setw synchronize-panes \; display-message "  sync-panes #{?synchronize-panes,ON,OFF}"

# ----------------------------------------------------------------------------
#  Copy mode — Vim style
# ----------------------------------------------------------------------------
setw -g mode-keys vi

bind Enter copy-mode
bind -T copy-mode-vi v     send -X begin-selection
bind -T copy-mode-vi C-v   send -X rectangle-toggle
bind -T copy-mode-vi y     send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel
# Paste the tmux buffer
bind P paste-buffer

# ----------------------------------------------------------------------------
#  Status bar
# ----------------------------------------------------------------------------
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left

# Palette (a clean dark theme)
#   bg:   #1e2030   fg: #c8d3f5   accent: #82aaff   muted: #545c7e
set -g status-style "bg=#1e2030,fg=#c8d3f5"

# Left: session name in an accent block
set -g status-left-length 40
set -g status-left "#[bg=#82aaff,fg=#1e2030,bold]  #S #[bg=#1e2030,fg=#82aaff]#[default] "

# Right: date + time
set -g status-right-length 80
set -g status-right "#[fg=#545c7e]#{?client_prefix,#[fg=#ff966c]󰠠 PREFIX ,}#[fg=#828bb8]%a %d %b #[fg=#82aaff,bold]%H:%M "

# Windows
setw -g window-status-separator ""
setw -g window-status-format         "#[fg=#545c7e] #I #W "
setw -g window-status-current-format "#[bg=#2d3149,fg=#82aaff,bold] #I #W "
setw -g window-status-current-style  ""
setw -g window-status-activity-style "fg=#ff966c"

# Panes
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#82aaff"
set -g display-panes-active-colour "#82aaff"
set -g display-panes-colour "#545c7e"

# Messages / command line
set -g message-style "bg=#82aaff,fg=#1e2030,bold"
set -g message-command-style "bg=#82aaff,fg=#1e2030,bold"

# Activity monitoring (highlights windows with output, no bell)
setw -g monitor-activity on
set -g visual-activity off
set -g bell-action none

# ----------------------------------------------------------------------------
#  Local overrides (optional, git-ignored): ~/.tmux.conf.local
# ----------------------------------------------------------------------------
if-shell "[ -f ~/.tmux.conf.local ]" "source-file ~/.tmux.conf.local"
